<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MineRogue</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
    #game-canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

    /* UI Layer */
    #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
    #ui-layer > * { pointer-events: auto; }

    /* Crosshair */
    #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 20px; text-shadow: 0 0 2px #000; pointer-events: none; z-index: 20; mix-blend-mode: difference; }

    /* HUD */
    #hud { position: absolute; bottom: 0; left: 0; width: 100%; padding: 8px; display: none; }
    #hud-top { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 4px; align-items: center; }
    .hud-bar { display: flex; gap: 2px; }
    .heart, .hunger-icon { width: 16px; height: 16px; image-rendering: pixelated; }
    #hotbar { display: flex; justify-content: center; gap: 2px; position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); }
    .hotbar-slot { width: 48px; height: 48px; border: 2px solid #555; background: rgba(0,0,0,0.6); position: relative; image-rendering: pixelated; }
    .hotbar-slot.selected { border-color: #fff; }
    .hotbar-slot .slot-count { position: absolute; bottom: 1px; right: 3px; color: #fff; font-size: 10px; text-shadow: 1px 1px 0 #000; }
    .hotbar-slot .slot-name { position: absolute; top: 1px; left: 2px; color: #fff; font-size: 7px; text-shadow: 1px 1px 0 #000; max-width: 44px; overflow: hidden; }

    /* Status effects */
    #status-effects { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; gap: 4px; }

    /* Crosshair tooltip */
    #block-info { position: absolute; top: 50%; left: 50%; transform: translate(-50%, 40px); color: #fff; font-size: 12px; text-shadow: 1px 1px 0 #000; text-align: center; pointer-events: none; }

    /* Mining progress */
    #mine-progress { position: absolute; top: 50%; left: 50%; transform: translate(-50%, 60px); width: 80px; height: 4px; background: rgba(0,0,0,0.5); display: none; }
    #mine-progress-bar { height: 100%; background: #4f4; width: 0%; }

    /* Damage overlay */
    #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0; background: radial-gradient(ellipse at center, transparent 50%, rgba(255,0,0,0.6) 100%); transition: opacity 0.1s; z-index: 15; }

    /* Low health pulse */
    #low-health-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0; background: radial-gradient(ellipse at center, transparent 40%, rgba(255,0,0,0.4) 100%); z-index: 14; }

    /* Damage numbers container */
    #damage-numbers { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 25; }
    .dmg-number { position: absolute; color: #fff; font-size: 18px; font-weight: bold; text-shadow: 2px 2px 0 #000; animation: dmgFloat 0.8s ease-out forwards; pointer-events: none; }
    .dmg-number.crit { color: #ff0; font-size: 24px; }
    .dmg-number.player-dmg { color: #f44; }
    @keyframes dmgFloat { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-60px); } }

    /* Toast messages */
    #toasts { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -80px); display: flex; flex-direction: column; align-items: center; gap: 4px; pointer-events: none; z-index: 25; }
    .toast { color: #fff; font-size: 14px; text-shadow: 1px 1px 0 #000; animation: toastFade 2s ease-out forwards; }
    @keyframes toastFade { 0% { opacity: 1; transform: translateY(0); } 70% { opacity: 1; } 100% { opacity: 0; transform: translateY(-20px); } }

    /* Main menu */
    #main-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2a 50%, #0a1a1a 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    #main-menu h1 { font-size: 64px; color: #f0c040; text-shadow: 3px 3px 0 #804000, 0 0 20px rgba(240,192,64,0.3); margin-bottom: 8px; letter-spacing: 4px; }
    #main-menu .subtitle { color: #888; font-size: 14px; margin-bottom: 40px; }
    .menu-btn { background: rgba(255,255,255,0.05); border: 2px solid #555; color: #ccc; padding: 12px 48px; margin: 6px; font-size: 18px; font-family: 'Courier New', monospace; cursor: pointer; transition: all 0.15s; min-width: 200px; text-align: center; }
    .menu-btn:hover { background: rgba(255,255,255,0.1); border-color: #f0c040; color: #f0c040; }
    .menu-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #shard-display { color: #a0a0ff; font-size: 16px; margin-top: 20px; }
    #controls-hint { color: #555; font-size: 11px; margin-top: 30px; text-align: center; line-height: 1.6; }

    /* Death screen */
    #death-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(80,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    #death-screen h1 { font-size: 48px; color: #f44; text-shadow: 3px 3px 0 #400; margin-bottom: 20px; }
    #death-stats { color: #ccc; font-size: 14px; text-align: center; line-height: 1.8; margin-bottom: 20px; }
    #shard-earned { color: #a0a0ff; font-size: 24px; margin-bottom: 30px; }

    /* Inventory screen */
    #inventory-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 50; }
    #inventory-panel { background: #2a2a2a; border: 2px solid #555; padding: 16px; min-width: 340px; }
    #inv-title { color: #fff; font-size: 16px; text-align: center; margin-bottom: 12px; }
    #inv-grid { display: grid; grid-template-columns: repeat(9, 40px); gap: 2px; margin-bottom: 8px; }
    .inv-slot { width: 40px; height: 40px; border: 1px solid #555; background: #1a1a1a; position: relative; cursor: pointer; }
    .inv-slot:hover { border-color: #aaa; }
    .inv-slot .slot-icon { width: 32px; height: 32px; position: absolute; top: 2px; left: 2px; image-rendering: pixelated; }
    .inv-slot .slot-count { position: absolute; bottom: 0; right: 2px; color: #fff; font-size: 9px; text-shadow: 1px 1px 0 #000; }
    #craft-grid { display: grid; grid-template-columns: repeat(2, 40px); gap: 2px; margin: 8px auto; width: fit-content; }
    #craft-result { margin: 8px auto; width: fit-content; }
    #armor-slots { display: flex; gap: 4px; margin-bottom: 8px; justify-content: center; }
    .armor-slot { width: 40px; height: 40px; border: 1px solid #665; background: #1a1a2a; position: relative; }

    /* Crafting table screen */
    #crafting-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 50; }
    #crafting-panel { background: #2a2a2a; border: 2px solid #555; padding: 16px; }
    #craft-grid-3x3 { display: grid; grid-template-columns: repeat(3, 40px); gap: 2px; margin: 8px auto; width: fit-content; }

    /* Furnace screen */
    #furnace-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 50; }
    #furnace-panel { background: #2a2a2a; border: 2px solid #555; padding: 16px; }

    /* Shop screen */
    #shop-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 50; }
    #shop-panel { background: #2a2a2a; border: 2px solid #555; padding: 16px; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .shop-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #333; color: #ccc; }
    .shop-item:hover { background: rgba(255,255,255,0.05); }
    .shop-buy { background: #2a4a2a; border: 1px solid #4a4; color: #4f4; padding: 4px 12px; cursor: pointer; font-family: inherit; }
    .shop-buy:hover { background: #3a5a3a; }
    .shop-buy:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Pause screen */
    #pause-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 90; }

    /* Minimap */
    #minimap { position: absolute; top: 8px; right: 8px; display: none; z-index: 30; }
    #minimap canvas { border: 2px solid #555; image-rendering: pixelated; }

    /* NPC Dialog */
    #npc-dialog { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 50; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #555; }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="ui-layer">
    <!-- Crosshair -->
    <div id="crosshair">+</div>
    <div id="block-info"></div>
    <div id="mine-progress"><div id="mine-progress-bar"></div></div>

    <!-- HUD -->
    <div id="hud">
      <div id="hud-top">
        <div class="hud-bar" id="hearts"></div>
        <div class="hud-bar" id="hunger-bar"></div>
      </div>
      <div id="hotbar"></div>
    </div>

    <!-- Overlays -->
    <div id="damage-overlay"></div>
    <div id="low-health-overlay"></div>
    <div id="damage-numbers"></div>
    <div id="toasts"></div>

    <!-- Main Menu -->
    <div id="main-menu">
      <h1>MINE ROGUE</h1>
      <div class="subtitle">A Voxel Roguelike</div>
      <button class="menu-btn" id="btn-play">⚔ Play</button>
      <button class="menu-btn" id="btn-home">🏠 Home World</button>
      <button class="menu-btn" id="btn-shop">🔮 Soul Shop</button>
       <button class="menu-btn" id="btn-settings">⚙ Settings</button>
      <div id="shard-display">✦ Soul Shards: <span id="shard-count">0</span></div>
      <div id="controls-hint">
        WASD Move · Mouse Look · LClick Mine/Attack · RClick Place<br>
        E Inventory · C Crafting · Space Jump · Shift Sprint · ESC Pause
      </div>
    </div>

    <!-- Death Screen -->
    <div id="death-screen">
      <h1>YOU DIED</h1>
      <div id="death-stats"></div>
      <div id="shard-earned">✦ +0 Soul Shards</div>
      <button class="menu-btn" id="btn-respawn">New Run</button>
      <button class="menu-btn" id="btn-death-menu">Menu</button>
    </div>

    <!-- Inventory Screen -->
    <div id="inventory-screen">
      <div id="inventory-panel">
        <div id="inv-title">Inventory</div>
        <div id="armor-slots">
          <div class="armor-slot" data-slot="helmet"></div>
          <div class="armor-slot" data-slot="chestplate"></div>
          <div class="armor-slot" data-slot="leggings"></div>
          <div class="armor-slot" data-slot="boots"></div>
        </div>
        <div id="inv-grid"></div>
        <div style="display:flex;gap:16px;justify-content:center;margin-top:8px;">
          <div>
            <div style="color:#888;font-size:11px;text-align:center;">Crafting</div>
            <div id="craft-grid"></div>
          </div>
          <div>
            <div style="color:#888;font-size:11px;text-align:center;">Result</div>
            <div id="craft-result"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Crafting Table Screen -->
    <div id="crafting-screen">
      <div id="crafting-panel">
        <div id="inv-title">Crafting Table</div>
        <div id="craft-grid-3x3"></div>
        <div id="craft-result-3x3" style="margin:8px auto;width:fit-content;"></div>
      </div>
    </div>

    <!-- Furnace Screen -->
    <div id="furnace-screen">
      <div id="furnace-panel">
        <div id="inv-title">Furnace</div>
        <div style="display:flex;gap:8px;align-items:center;">
          <div class="inv-slot" id="furnace-input"></div>
          <div style="color:#888;">→</div>
          <div class="inv-slot" id="furnace-fuel"></div>
          <div style="color:#888;">→</div>
          <div class="inv-slot" id="furnace-output"></div>
        </div>
        <div style="margin-top:8px;background:#111;height:8px;width:100%;">
          <div id="furnace-progress" style="height:100%;background:#f80;width:0%;"></div>
        </div>
      </div>
    </div>

    <!-- Shop Screen -->
    <div id="shop-screen">
      <div id="shop-panel">
        <div id="inv-title">Soul Shop ✦<span id="shop-shards">0</span></div>
        <div id="shop-items"></div>
        <button class="menu-btn" id="btn-close-shop" style="margin-top:12px;">Close</button>
      </div>
    </div>

    <!-- Pause Screen -->
    <div id="pause-screen">
      <h1 style="color:#fff;font-size:32px;margin-bottom:20px;">PAUSED</h1>
      <div id="pause-stats" style="color:#aaa;font-size:13px;text-align:center;line-height:1.8;margin-bottom:20px;"></div>
      <button class="menu-btn" id="btn-resume">Resume</button>
      <button class="menu-btn" id="btn-quit">Quit to Menu</button>
    </div>

    <!-- Minimap -->
    <div id="minimap"><canvas id="minimap-canvas" width="128" height="128"></canvas></div>
     <!-- Settings Screen -->
     <div id="settings-screen" style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;">
       <h1 style="color:#fff;font-size:32px;margin-bottom:24px;">SETTINGS</h1>
       <div style="width:320px;display:flex;flex-direction:column;gap:12px;">
         <label style="color:#ccc;display:flex;justify-content:space-between;align-items:center;">
           Master Volume
           <input type="range" id="setting-volume" min="0" max="100" value="50" style="width:160px;">
         </label>
         <label style="color:#ccc;display:flex;justify-content:space-between;align-items:center;">
           Mouse Sensitivity
           <input type="range" id="setting-sensitivity" min="1" max="100" value="20" style="width:160px;">
         </label>
         <label style="color:#ccc;display:flex;justify-content:space-between;align-items:center;">
           Render Distance
           <input type="range" id="setting-renderdist" min="4" max="12" value="8" style="width:160px;">
         </label>
         <label style="color:#ccc;display:flex;justify-content:space-between;align-items:center;">
           Show FPS
           <input type="checkbox" id="setting-showfps" style="width:20px;height:20px;">
         </label>
       </div>
       <button class="menu-btn" id="btn-close-settings" style="margin-top:24px;">Back</button>
     </div>
    </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
