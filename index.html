<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MineRogue</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
    #game-canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

    /* UI Layer */
    #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
    #ui-layer > * { pointer-events: auto; }

    /* Crosshair */
    #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 20px; text-shadow: 0 0 2px #000; pointer-events: none; z-index: 20; mix-blend-mode: difference; }

    /* HUD */
    #hud { position: absolute; bottom: 0; left: 0; width: 100%; padding: 8px; display: none; }
    #hud-top { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 4px; align-items: center; }
    .hud-bar { display: flex; gap: 2px; }
    .heart, .hunger-icon { width: 16px; height: 16px; image-rendering: pixelated; }
    #hotbar { display: flex; justify-content: center; gap: 2px; position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); }
    .hotbar-slot { width: 48px; height: 48px; border: 2px solid #555; background: rgba(0,0,0,0.6); position: relative; image-rendering: pixelated; }
    .hotbar-slot.selected { border-color: #fff; }
    .hotbar-slot .slot-count { position: absolute; bottom: 1px; right: 3px; color: #fff; font-size: 10px; text-shadow: 1px 1px 0 #000; }
    .hotbar-slot .slot-name { position: absolute; top: 1px; left: 2px; color: #fff; font-size: 7px; text-shadow: 1px 1px 0 #000; max-width: 44px; overflow: hidden; }

    /* Status effects */
    #status-effects { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; gap: 4px; }

    /* Crosshair tooltip */
    #block-info { position: absolute; top: 50%; left: 50%; transform: translate(-50%, 40px); color: #fff; font-size: 12px; text-shadow: 1px 1px 0 #000; text-align: center; pointer-events: none; }

    /* Mining progress */
    #mine-progress { position: absolute; top: 50%; left: 50%; transform: translate(-50%, 60px); width: 80px; height: 4px; background: rgba(0,0,0,0.5); display: none; }
    #mine-progress-bar { height: 100%; background: #4f4; width: 0%; }

    /* Damage overlay */
    #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0; background: radial-gradient(ellipse at center, transparent 50%, rgba(255,0,0,0.6) 100%); transition: opacity 0.1s; z-index: 15; }

    /* Low health pulse */
    #low-health-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0; background: radial-gradient(ellipse at center, transparent 40%, rgba(255,0,0,0.4) 100%); z-index: 14; }

    /* Damage numbers container */
    #damage-numbers { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 25; }
    .dmg-number { position: absolute; color: #fff; font-size: 18px; font-weight: bold; text-shadow: 2px 2px 0 #000; animation: dmgFloat 0.8s ease-out forwards; pointer-events: none; }
    .dmg-number.crit { color: #ff0; font-size: 24px; }
    .dmg-number.player-dmg { color: #f44; }
    @keyframes dmgFloat { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-60px); } }

    /* Toast messages */
    #toasts { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -80px); display: flex; flex-direction: column; align-items: center; gap: 4px; pointer-events: none; z-index: 25; }
    .toast { color: #fff; font-size: 14px; text-shadow: 1px 1px 0 #000; animation: toastFade 2s ease-out forwards; }
    @keyframes toastFade { 0% { opacity: 1; transform: translateY(0); } 70% { opacity: 1; } 100% { opacity: 0; transform: translateY(-20px); } }

    /* Main menu */
    #main-menu {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 214, 120, 0.18) 0%, rgba(255, 214, 120, 0.08) 18%, rgba(0,0,0,0) 36%),
        linear-gradient(180deg, #0f1a2d 0%, #152238 24%, #2a1730 58%, #0f0c18 100%);
      isolation: isolate;
    }
    #main-menu::before,
    #main-menu::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    #main-menu::before {
      opacity: 0.35;
      background-image:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.9) 0 1px, transparent 1.5px),
        radial-gradient(circle at 72% 16%, rgba(255,255,255,0.65) 0 1px, transparent 1.5px),
        radial-gradient(circle at 82% 30%, rgba(255,255,255,0.55) 0 1px, transparent 1.5px),
        radial-gradient(circle at 35% 10%, rgba(255,255,255,0.8) 0 1px, transparent 1.5px),
        radial-gradient(circle at 60% 28%, rgba(255,255,255,0.45) 0 1px, transparent 1.5px);
      animation: menuStars 10s ease-in-out infinite alternate;
    }
    #main-menu::after {
      background: radial-gradient(circle at center, transparent 45%, rgba(0,0,0,0.35) 100%);
    }
    .menu-backdrop {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .menu-sun {
      position: absolute;
      top: 8vh;
      left: 50%;
      width: 132px;
      height: 132px;
      transform: translateX(-50%) rotate(45deg);
      border: 6px solid rgba(255, 248, 220, 0.55);
      background:
        linear-gradient(135deg, #ffe08a 0%, #ffbf4d 55%, #a85a10 100%);
      box-shadow:
        0 0 0 8px rgba(255, 208, 96, 0.12),
        0 0 42px rgba(255, 186, 64, 0.35),
        0 0 110px rgba(255, 120, 40, 0.14);
      opacity: 0.95;
      animation: menuSunFloat 7s ease-in-out infinite;
    }
    .menu-fog,
    .menu-fog::before,
    .menu-fog::after {
      position: absolute;
      left: -10%;
      right: -10%;
      height: 120px;
      content: '';
      background: radial-gradient(circle at 50% 50%, rgba(125, 160, 190, 0.18) 0%, rgba(125, 160, 190, 0.08) 40%, rgba(125, 160, 190, 0) 72%);
      filter: blur(12px);
    }
    .menu-fog {
      bottom: 23vh;
      animation: menuFogDrift 16s linear infinite;
    }
    .menu-fog::before {
      bottom: -26px;
      animation: menuFogDrift 22s linear infinite reverse;
    }
    .menu-fog::after {
      bottom: -54px;
      animation: menuFogDrift 20s linear infinite;
      opacity: 0.75;
    }
    .menu-mountains {
      position: absolute;
      inset: auto 0 0 0;
      height: 48vh;
      background:
        linear-gradient(180deg, transparent 0%, transparent 12%, rgba(0,0,0,0.08) 12.5%, rgba(0,0,0,0) 13%),
        linear-gradient(180deg, transparent 0%, transparent 55%, rgba(0,0,0,0.16) 55%, rgba(0,0,0,0.2) 100%);
    }
    .menu-mountains::before,
    .menu-mountains::after {
      content: '';
      position: absolute;
      inset: auto 0 0 0;
      background-repeat: repeat-x;
      image-rendering: pixelated;
    }
    .menu-mountains::before {
      height: 62%;
      background:
        linear-gradient(135deg, transparent 0 49%, #1e2d24 49% 51%, transparent 51%) 0 100% / 180px 100% repeat-x,
        linear-gradient(225deg, transparent 0 49%, #243428 49% 51%, transparent 51%) 90px 100% / 180px 100% repeat-x;
      opacity: 0.95;
    }
    .menu-mountains::after {
      height: 36%;
      background:
        linear-gradient(135deg, transparent 0 49%, #111a15 49% 51%, transparent 51%) 0 100% / 140px 100% repeat-x,
        linear-gradient(225deg, transparent 0 49%, #16221a 49% 51%, transparent 51%) 70px 100% / 140px 100% repeat-x;
      opacity: 0.96;
    }
    .menu-ground {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 23vh;
      background:
        linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(13, 18, 14, 0.2) 22%, rgba(13, 18, 14, 0.92) 100%),
        repeating-linear-gradient(90deg, rgba(0,0,0,0.22) 0 18px, rgba(255,255,255,0.03) 18px 20px),
        repeating-linear-gradient(180deg, #3d5f31 0 18px, #315126 18px 20px, #2b4120 20px 38px, #231914 38px 40px);
      border-top: 5px solid rgba(118, 170, 88, 0.85);
      box-shadow: 0 -14px 28px rgba(0,0,0,0.25);
    }
    .menu-voxels {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .menu-voxel {
      position: absolute;
      bottom: 18vh;
      width: 78px;
      height: 78px;
      transform: rotate(45deg);
      animation: menuVoxelFloat 6s ease-in-out infinite;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.35));
      opacity: 0.9;
    }
    .menu-voxel::before,
    .menu-voxel::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 4px solid rgba(0,0,0,0.18);
    }
    .menu-voxel::before {
      background: linear-gradient(135deg, #7db266 0%, #5a8f46 100%);
    }
    .menu-voxel::after {
      inset: 12px;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(0,0,0,0.15));
    }
    .menu-voxel.left { left: 11%; animation-delay: -1s; }
    .menu-voxel.right { right: 13%; bottom: 21vh; width: 62px; height: 62px; animation-delay: -3s; }
    .menu-voxel.small { left: 21%; bottom: 27vh; width: 36px; height: 36px; opacity: 0.55; animation-delay: -2s; }
    .menu-panel-wrap {
      position: relative;
      z-index: 2;
      width: min(92vw, 720px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 34px 28px 22px;
    }
    .menu-panel {
      width: 100%;
      max-width: 520px;
      position: relative;
      padding: 28px 24px 24px;
      border: 4px solid #1a130d;
      background:
        linear-gradient(180deg, rgba(31, 23, 17, 0.96) 0%, rgba(46, 33, 24, 0.97) 100%);
      box-shadow:
        0 0 0 4px rgba(114, 88, 54, 0.95),
        0 0 0 8px rgba(30, 20, 14, 0.95),
        0 24px 50px rgba(0,0,0,0.42);
    }
    .menu-panel::before,
    .menu-panel::after {
      content: '';
      position: absolute;
      inset: 10px;
      pointer-events: none;
    }
    .menu-panel::before {
      border: 2px solid rgba(214, 176, 114, 0.18);
    }
    .menu-panel::after {
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0)),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0 22px, rgba(0,0,0,0.05) 22px 24px);
      mix-blend-mode: screen;
      opacity: 0.22;
    }
    .menu-title-wrap {
      position: relative;
      margin-bottom: 16px;
      padding: 8px 18px 18px;
      text-align: center;
    }
    .menu-title-wrap::before,
    .menu-title-wrap::after {
      content: '';
      position: absolute;
      top: 18px;
      width: 64px;
      height: 6px;
      background: linear-gradient(90deg, rgba(255,196,64,0), rgba(255,196,64,0.85), rgba(255,196,64,0));
      box-shadow: 0 0 10px rgba(255,196,64,0.28);
    }
    .menu-title-wrap::before { left: -42px; }
    .menu-title-wrap::after { right: -42px; }
    #main-menu h1 {
      font-size: clamp(48px, 7vw, 86px);
      line-height: 0.95;
      margin-bottom: 10px;
      letter-spacing: 6px;
      color: #ffd86b;
      text-transform: uppercase;
      text-shadow:
        0 4px 0 #7a4a12,
        0 8px 0 #4a2608,
        0 14px 24px rgba(0,0,0,0.45),
        0 0 18px rgba(255, 196, 64, 0.2);
      animation: menuTitlePulse 5s ease-in-out infinite;
    }
    #main-menu .subtitle {
      color: #c8b79a;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 6px;
      opacity: 0.92;
    }
    .menu-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }
    .menu-btn {
      position: relative;
      width: min(100%, 340px);
      min-width: 260px;
      padding: 14px 20px;
      margin: 0;
      border: 3px solid #1f140d;
      outline: 3px solid rgba(120, 87, 48, 0.95);
      outline-offset: -6px;
      background:
        linear-gradient(180deg, #86613d 0%, #5d3f27 48%, #422b1b 48%, #2f1f14 100%);
      color: #f8e6be;
      font-size: 18px;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
      text-shadow: 0 2px 0 rgba(0,0,0,0.75);
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.12s ease, color 0.12s ease;
      box-shadow: 0 8px 0 #1d130c, 0 12px 22px rgba(0,0,0,0.34);
      overflow: hidden;
    }
    .menu-btn::before {
      content: '';
      position: absolute;
      inset: 4px 8px auto 8px;
      height: 34%;
      background: linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0));
      pointer-events: none;
    }
    .menu-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.12) 50%, transparent 100%);
      transform: translateX(-130%);
      transition: transform 0.28s ease;
      pointer-events: none;
    }
    .menu-btn:hover {
      transform: translateY(-2px);
      color: #fff4cf;
      filter: brightness(1.08);
    }
    .menu-btn:hover::after { transform: translateX(130%); }
    .menu-btn:active {
      transform: translateY(4px);
      box-shadow: 0 3px 0 #1d130c, 0 6px 12px rgba(0,0,0,0.22);
    }
    .menu-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #shard-display {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      padding: 10px 16px;
      border: 2px solid #3a2748;
      background: linear-gradient(180deg, rgba(45, 28, 58, 0.96), rgba(26, 16, 36, 0.98));
      color: #ccb8ff;
      font-size: 16px;
      box-shadow: 0 10px 18px rgba(0,0,0,0.24), inset 0 0 0 2px rgba(134, 97, 183, 0.18);
    }
    #controls-hint {
      max-width: 720px;
      padding: 12px 18px 0;
      color: rgba(236, 229, 214, 0.72);
      font-size: 11px;
      text-align: center;
      line-height: 1.7;
      letter-spacing: 0.8px;
      text-shadow: 0 2px 0 rgba(0,0,0,0.55);
    }
    @keyframes menuStars {
      from { transform: translateY(0); opacity: 0.28; }
      to { transform: translateY(-8px); opacity: 0.48; }
    }
    @keyframes menuSunFloat {
      0%, 100% { transform: translateX(-50%) rotate(45deg) translateY(0); }
      50% { transform: translateX(-50%) rotate(45deg) translateY(8px); }
    }
    @keyframes menuFogDrift {
      from { transform: translateX(-2%); }
      to { transform: translateX(2%); }
    }
    @keyframes menuVoxelFloat {
      0%, 100% { transform: rotate(45deg) translateY(0); }
      50% { transform: rotate(45deg) translateY(-10px); }
    }
    @keyframes menuTitlePulse {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    /* Death screen */
    #death-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(80,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    #death-screen h1 { font-size: 48px; color: #f44; text-shadow: 3px 3px 0 #400; margin-bottom: 20px; }
    #death-stats { color: #ccc; font-size: 14px; text-align: center; line-height: 1.8; margin-bottom: 20px; }
    #shard-earned { color: #a0a0ff; font-size: 24px; margin-bottom: 30px; }

    /* Inventory screen */
    #inventory-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 50; cursor: none; }
    #inventory-panel { background: #2a2a2a; border: 2px solid #555; padding: 16px; min-width: 340px; max-height: 85vh; overflow-y: auto; }
    #inv-title { color: #fff; font-size: 16px; text-align: center; margin-bottom: 12px; }
    #inv-grid { display: grid; grid-template-columns: repeat(9, 40px); gap: 2px; margin-bottom: 8px; }
    #inv-hotbar { display: grid; grid-template-columns: repeat(9, 40px); gap: 2px; margin-top: 8px; justify-content: center; border-top: 2px solid #555; padding-top: 8px; }
    .inv-slot.hotbar-selected { border-color: #fff !important; box-shadow: 0 0 6px rgba(255,255,255,0.6); }
    .inv-slot { width: 40px; height: 40px; border: 1px solid #555; background: #1a1a1a; position: relative; cursor: pointer; }
    .inv-slot:hover { border-color: #aaa; }
    .inv-slot .slot-icon { width: 32px; height: 32px; position: absolute; top: 2px; left: 2px; image-rendering: pixelated; }
    .inv-slot .slot-count { position: absolute; bottom: 0; right: 2px; color: #fff; font-size: 9px; text-shadow: 1px 1px 0 #000; }
    #craft-grid { display: grid; grid-template-columns: repeat(2, 40px); gap: 2px; margin: 8px auto; width: fit-content; }
    #craft-result { margin: 8px auto; width: fit-content; }
    #armor-slots { display: flex; gap: 4px; margin-bottom: 8px; justify-content: center; }
    .armor-slot { width: 40px; height: 40px; border: 1px solid #665; background: #1a1a2a; position: relative; }

    /* Crafting table screen */
    #crafting-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 50; cursor: none; }
    #crafting-panel { background: #2a2a2a; border: 2px solid #555; padding: 16px; max-height: 80vh; overflow-y: auto; }
    #craft-grid-3x3 { display: grid; grid-template-columns: repeat(3, 40px); gap: 2px; margin: 8px auto; width: fit-content; }

    /* Furnace screen */
    #furnace-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 50; }
    #furnace-panel { background: #2a2a2a; border: 2px solid #555; padding: 16px; }

    /* Shop screen */
    #shop-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 50; }
    #shop-panel { background: #2a2a2a; border: 2px solid #555; padding: 16px; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .shop-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #333; color: #ccc; }
    .shop-item:hover { background: rgba(255,255,255,0.05); }
    .shop-buy { background: #2a4a2a; border: 1px solid #4a4; color: #4f4; padding: 4px 12px; cursor: pointer; font-family: inherit; }
    .shop-buy:hover { background: #3a5a3a; }
    .shop-buy:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Pause screen */
    #pause-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 90; }

    /* Minimap */
    #minimap { position: absolute; top: 8px; right: 8px; display: none; z-index: 30; }
    #minimap canvas { border: 2px solid #555; image-rendering: pixelated; }

    /* NPC Dialog */
    #npc-dialog { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 50; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #555; }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="ui-layer">
    <!-- Crosshair -->
    <div id="crosshair">+</div>
    <div id="block-info"></div>
    <div id="mine-progress"><div id="mine-progress-bar"></div></div>

    <!-- HUD -->
    <div id="hud">
      <div id="hud-top">
        <div class="hud-bar" id="hearts"></div>
        <div class="hud-bar" id="hunger-bar"></div>
      </div>
      <div id="hotbar"></div>
    </div>

    <!-- Overlays -->
    <div id="damage-overlay"></div>
    <div id="low-health-overlay"></div>
    <div id="damage-numbers"></div>
    <div id="toasts"></div>

    <!-- Main Menu -->
    <div id="main-menu">
      <div class="menu-backdrop" aria-hidden="true">
        <div class="menu-sun"></div>
        <div class="menu-fog"></div>
        <div class="menu-mountains"></div>
        <div class="menu-ground"></div>
        <div class="menu-voxels">
          <div class="menu-voxel left"></div>
          <div class="menu-voxel right"></div>
          <div class="menu-voxel small"></div>
        </div>
      </div>
      <div class="menu-panel-wrap">
        <div class="menu-panel">
          <div class="menu-title-wrap">
            <h1>MINE ROGUE</h1>
            <div class="subtitle">A Voxel Roguelike</div>
          </div>
          <div class="menu-actions">
            <button class="menu-btn" id="btn-play">⚔ Play</button>
            <button class="menu-btn" id="btn-home">🏠 Home World</button>
            <button class="menu-btn" id="btn-shop">🔮 Soul Shop</button>
            <button class="menu-btn" id="btn-settings">⚙ Settings</button>
          </div>
          <div id="shard-display">✦ Soul Shards: <span id="shard-count">0</span></div>
        </div>
        <div id="controls-hint">
          WASD Move · Mouse Look · LClick Mine/Attack · RClick Place<br>
          E Inventory · C Crafting · M Minimap · Space Jump · Shift Sprint · ESC Pause
        </div>
      </div>
    </div>

    <!-- Death Screen -->
    <div id="death-screen">
      <h1>YOU DIED</h1>
      <div id="death-stats"></div>
      <div id="shard-earned">✦ +0 Soul Shards</div>
      <button class="menu-btn" id="btn-respawn">New Run</button>
      <button class="menu-btn" id="btn-death-menu">Menu</button>
    </div>

    <!-- Inventory Screen -->
    <div id="inventory-screen">
      <div id="inventory-panel">
        <div id="inv-title">Inventory</div>
        <div id="armor-slots">
          <div class="armor-slot" data-slot="helmet"></div>
          <div class="armor-slot" data-slot="chestplate"></div>
          <div class="armor-slot" data-slot="leggings"></div>
          <div class="armor-slot" data-slot="boots"></div>
        </div>
        <div id="inv-grid"></div>
        <div id="inv-hotbar"></div>
        <div style="display:flex;gap:16px;justify-content:center;margin-top:8px;">
          <div>
            <div style="color:#888;font-size:11px;text-align:center;">Crafting</div>
            <div id="craft-grid"></div>
          </div>
          <div>
            <div style="color:#888;font-size:11px;text-align:center;">Result</div>
            <div id="craft-result"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Crafting Table Screen -->
    <div id="crafting-screen">
      <div id="crafting-panel">
        <div id="inv-title">Crafting Table</div>
        <div id="craft-grid-3x3"></div>
        <div id="craft-result-3x3" style="margin:8px auto;width:fit-content;"></div>
      </div>
    </div>

    <!-- Furnace Screen -->
    <div id="furnace-screen">
      <div id="furnace-panel">
        <div id="inv-title">Furnace</div>
        <div style="display:flex;gap:8px;align-items:center;">
          <div class="inv-slot" id="furnace-input"></div>
          <div style="color:#888;">→</div>
          <div class="inv-slot" id="furnace-fuel"></div>
          <div style="color:#888;">→</div>
          <div class="inv-slot" id="furnace-output"></div>
        </div>
        <div style="margin-top:8px;background:#111;height:8px;width:100%;">
          <div id="furnace-progress" style="height:100%;background:#f80;width:0%;"></div>
        </div>
      </div>
    </div>

    <!-- Shop Screen -->
    <div id="shop-screen">
      <div id="shop-panel">
        <div id="inv-title">Soul Shop ✦<span id="shop-shards">0</span></div>
        <div id="shop-items"></div>
        <button class="menu-btn" id="btn-close-shop" style="margin-top:12px;">Close</button>
      </div>
    </div>

    <!-- Pause Screen -->
    <div id="pause-screen">
      <h1 style="color:#fff;font-size:32px;margin-bottom:20px;">PAUSED</h1>
      <div id="pause-stats" style="color:#aaa;font-size:13px;text-align:center;line-height:1.8;margin-bottom:20px;"></div>
      <button class="menu-btn" id="btn-resume">Resume</button>
      <button class="menu-btn" id="btn-quit">Quit to Menu</button>
    </div>

    <!-- Minimap -->
    <div id="minimap"><canvas id="minimap-canvas" width="128" height="128"></canvas></div>
     <!-- Settings Screen -->
     <div id="settings-screen" style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;">
       <h1 style="color:#fff;font-size:32px;margin-bottom:24px;">SETTINGS</h1>
       <div style="width:320px;display:flex;flex-direction:column;gap:12px;">
         <label style="color:#ccc;display:flex;justify-content:space-between;align-items:center;">
           Master Volume
           <input type="range" id="setting-volume" min="0" max="100" value="50" style="width:160px;">
         </label>
         <label style="color:#ccc;display:flex;justify-content:space-between;align-items:center;">
           Mouse Sensitivity
           <input type="range" id="setting-sensitivity" min="1" max="100" value="20" style="width:160px;">
         </label>
         <label style="color:#ccc;display:flex;justify-content:space-between;align-items:center;">
           Render Distance
           <input type="range" id="setting-renderdist" min="4" max="12" value="8" style="width:160px;">
         </label>
         <label style="color:#ccc;display:flex;justify-content:space-between;align-items:center;">
           Show FPS
           <input type="checkbox" id="setting-showfps" style="width:20px;height:20px;">
         </label>
       </div>
       <button class="menu-btn" id="btn-close-settings" style="margin-top:24px;">Back</button>
     </div>
    </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
